name: Atualizar eventos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'
  push:
    branches: [main]
    paths:
      - 'scrapers/**'
      - 'run.py'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Instalar Playwright browsers
        run: playwright install chromium --with-deps

      - name: Atualizar events.json
        run: python run.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add events.json
          git diff --cached --quiet || git commit -m "chore: atualiza events.json [skip ci]"
          git pull --rebase origin main
          git push
