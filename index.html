<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shows SP 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #111213;
  --surface:  #1a1b1d;
  --border:   #26282b;
  --border2:  #2f3235;
  --text:     #e8e9ea;
  --muted:    #6b6f74;
  --faint:    #3a3d42;
  --sesc:       #d4a843;
  --cine:       #e05252;
  --balaclava:  #5b8fe8;
  --francisca:  #e07d3c;
  --maldita:    #c45b9a;
  --porta:      #8a72e0;
  --picles:     #3ea87a;
  --rockambole: #d45ba0;
  --bona:       #b8a040;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Space Grotesk', sans-serif; font-weight: 400;
  max-width: 700px; margin: 0 auto; padding: 40px 20px 80px;
  -webkit-font-smoothing: antialiased;
}
.header { margin-bottom: 32px; }
.header-eyebrow {
  font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
}
.header-title { font-size: 34px; font-weight: 600; color: var(--text); line-height: 1.1; letter-spacing: -0.02em; }
.header-title span { color: var(--muted); font-weight: 300; }
.updated { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--faint); margin-top: 6px; letter-spacing: 0.08em; }

.section-label {
  font-family: 'Space Mono', monospace; font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); margin-bottom: 8px;
}
.venue-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
.vbtn {
  display: flex; align-items: center; gap: 7px; padding: 6px 12px 6px 8px;
  border-radius: 5px; border: 1.5px solid var(--border2); background: var(--surface);
  color: var(--muted); font-family: 'Space Grotesk', sans-serif; font-size: 12px;
  font-weight: 500; cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
}
.vbtn:hover { border-color: var(--faint); color: var(--text); }
.vswatch { width: 8px; height: 8px; border-radius: 2px; background: var(--faint); flex-shrink: 0; transition: background 0.15s; }
.vbtn.on { color: var(--text); }
.vbtn[data-v="sesc"].on       { border-color: var(--sesc);       background: color-mix(in srgb, var(--sesc) 9%, var(--surface)); }
.vbtn[data-v="sesc"].on .vswatch       { background: var(--sesc); }
.vbtn[data-v="cine"].on       { border-color: var(--cine);       background: color-mix(in srgb, var(--cine) 9%, var(--surface)); }
.vbtn[data-v="cine"].on .vswatch       { background: var(--cine); }
.vbtn[data-v="balaclava"].on  { border-color: var(--balaclava);  background: color-mix(in srgb, var(--balaclava) 9%, var(--surface)); }
.vbtn[data-v="balaclava"].on .vswatch  { background: var(--balaclava); }
.vbtn[data-v="francisca"].on  { border-color: var(--francisca);  background: color-mix(in srgb, var(--francisca) 9%, var(--surface)); }
.vbtn[data-v="francisca"].on .vswatch  { background: var(--francisca); }
.vbtn[data-v="maldita"].on    { border-color: var(--maldita);    background: color-mix(in srgb, var(--maldita) 9%, var(--surface)); }
.vbtn[data-v="maldita"].on .vswatch    { background: var(--maldita); }
.vbtn[data-v="porta"].on      { border-color: var(--porta);      background: color-mix(in srgb, var(--porta) 9%, var(--surface)); }
.vbtn[data-v="porta"].on .vswatch      { background: var(--porta); }
.vbtn[data-v="picles"].on     { border-color: var(--picles);     background: color-mix(in srgb, var(--picles) 9%, var(--surface)); }
.vbtn[data-v="picles"].on .vswatch     { background: var(--picles); }
.vbtn[data-v="rockambole"].on { border-color: var(--rockambole); background: color-mix(in srgb, var(--rockambole) 9%, var(--surface)); }
.vbtn[data-v="rockambole"].on .vswatch { background: var(--rockambole); }
.vbtn[data-v="bona"].on       { border-color: var(--bona);       background: color-mix(in srgb, var(--bona) 9%, var(--surface)); }
.vbtn[data-v="bona"].on .vswatch       { background: var(--bona); }

.filter-bar {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding: 12px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 12px;
}
.filter-group { display: flex; align-items: center; gap: 7px; }
.filter-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); white-space: nowrap; }
.date-input {
  background: var(--bg); border: 1px solid var(--border2); color: var(--muted);
  padding: 5px 9px; border-radius: 4px; font-family: 'Space Grotesk', sans-serif;
  font-size: 12px; outline: none; cursor: pointer; transition: all 0.15s; color-scheme: dark;
}
.date-input:hover  { border-color: var(--faint); }
.date-input:focus  { border-color: var(--muted); color: var(--text); }
.date-input.active { border-color: var(--muted); color: var(--text); }
.filter-sep { color: var(--faint); font-size: 14px; }
.clear-btn {
  margin-left: auto; background: none; border: 1px solid var(--border2);
  color: var(--faint); padding: 4px 10px; border-radius: 4px;
  font-family: 'Space Grotesk', sans-serif; font-size: 11px;
  cursor: pointer; transition: all 0.15s; display: none;
}
.clear-btn.show { display: inline-block; }
.clear-btn:hover { border-color: var(--muted); color: var(--text); }

.genre-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; }
.chip {
  padding: 4px 11px; border-radius: 100px; border: 1px solid var(--border);
  background: none; color: var(--faint); font-family: 'Space Grotesk', sans-serif;
  font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.12s;
}
.chip:hover { border-color: var(--border2); color: var(--muted); }
.chip.on { background: var(--text); border-color: var(--text); color: var(--bg); }

.count-bar { display: flex; align-items: center; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.count { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--faint); }

.event {
  display: grid; grid-template-columns: 68px 1fr auto; gap: 0 16px;
  padding: 14px 0 14px 14px; border-bottom: 1px solid var(--border);
  text-decoration: none; color: inherit; align-items: start;
  opacity: 0; animation: fi 0.18s ease forwards; position: relative; transition: background 0.1s;
}
.event::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 0 2px 2px 0; }
.event:hover { background: rgba(255,255,255,0.02); }
@keyframes fi { to { opacity: 1; } }
.event[data-v="sesc"]::before       { background: var(--sesc); }
.event[data-v="cine"]::before       { background: var(--cine); }
.event[data-v="balaclava"]::before  { background: var(--balaclava); }
.event[data-v="francisca"]::before  { background: var(--francisca); }
.event[data-v="maldita"]::before    { background: var(--maldita); }
.event[data-v="porta"]::before      { background: var(--porta); }
.event[data-v="picles"]::before     { background: var(--picles); }
.event[data-v="rockambole"]::before { background: var(--rockambole); }
.event[data-v="bona"]::before       { background: var(--bona); }

.when-day { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; line-height: 1.3; padding-top: 2px; }
.when-time { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }
.who { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 3px; letter-spacing: -0.01em; }
.event:hover .who { color: #fff; }
.where { font-size: 12px; color: var(--muted); line-height: 1.5; }
.price-tag { display: inline; font-size: 11px; color: var(--faint); margin-left: 6px; }
.detail { font-size: 11px; color: var(--faint); margin-top: 2px; line-height: 1.4; }

.vtag { font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 7px; border-radius: 3px; white-space: nowrap; margin-top: 2px; display: inline-block; }
.t-sesc       { color: var(--sesc);       background: color-mix(in srgb, var(--sesc) 14%, var(--bg)); }
.t-cine       { color: var(--cine);       background: color-mix(in srgb, var(--cine) 14%, var(--bg)); }
.t-balaclava  { color: var(--balaclava);  background: color-mix(in srgb, var(--balaclava) 14%, var(--bg)); }
.t-francisca  { color: var(--francisca);  background: color-mix(in srgb, var(--francisca) 14%, var(--bg)); }
.t-maldita    { color: var(--maldita);    background: color-mix(in srgb, var(--maldita) 14%, var(--bg)); }
.t-porta      { color: var(--porta);      background: color-mix(in srgb, var(--porta) 14%, var(--bg)); }
.t-picles     { color: var(--picles);     background: color-mix(in srgb, var(--picles) 14%, var(--bg)); }
.t-rockambole { color: var(--rockambole); background: color-mix(in srgb, var(--rockambole) 14%, var(--bg)); }
.t-bona       { color: var(--bona);       background: color-mix(in srgb, var(--bona) 14%, var(--bg)); }

.empty { text-align: center; padding: 60px 0; color: var(--faint); font-size: 13px; line-height: 2; }
.error { text-align: center; padding: 40px 0; color: #e05252; font-size: 12px; font-family: 'Space Mono', monospace; }

.footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px 16px; }
.footer a { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); text-decoration: none; transition: color 0.15s; }
.footer a:hover { color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">SP · 2026</div>
  <div class="header-title">Shows <span>em São Paulo</span></div>
  <div class="updated" id="updated"></div>
</div>

<div class="section-label">Casas</div>
<div class="venue-row" id="venue-row"></div>

<div class="filter-bar">
  <div class="filter-group">
    <span class="filter-label">De</span>
    <input type="date" id="date-from" class="date-input" onchange="onDateChange()" />
  </div>
  <span class="filter-sep">—</span>
  <div class="filter-group">
    <span class="filter-label">Até</span>
    <input type="date" id="date-to" class="date-input" onchange="onDateChange()" />
  </div>
  <button id="date-clear" class="clear-btn" onclick="clearDate()">Limpar</button>
</div>

<div class="genre-row" id="chips"></div>
<div class="count-bar"><span class="count" id="count"></span></div>
<div id="list"></div>
<div class="footer" id="footer"></div>

<script>
var VENUES = [
  {id:"sesc",       label:"SESC",       tag:"t-sesc"},
  {id:"cine",       label:"Cine Joia",  tag:"t-cine"},
  {id:"balaclava",  label:"Balaclava",  tag:"t-balaclava"},
  {id:"francisca",  label:"Francisca",  tag:"t-francisca"},
  {id:"maldita",    label:"Maldita",    tag:"t-maldita"},
  {id:"porta",      label:"Porta",      tag:"t-porta"},
  {id:"picles",     label:"Picles",     tag:"t-picles"},
  {id:"rockambole", label:"Rockambole", tag:"t-rockambole"},
  {id:"bona",       label:"Bona",       tag:"t-bona"}
];
var VM = {};
VENUES.forEach(function(v) { VM[v.id] = v; });
var activeVenues = {};
VENUES.forEach(function(v) { activeVenues[v.id] = true; });

VENUES.forEach(function(v) {
  var b = document.createElement("button");
  b.className = "vbtn on"; b.setAttribute("data-v", v.id);
  b.innerHTML = "<span class='vswatch'></span>" + v.label;
  b.onclick = function() { toggleVenue(b); };
  document.getElementById("venue-row").appendChild(b);
});

var LINKS = [
  {l:"SESC",       u:"https://www.sescsp.org.br/programacao/"},
  {l:"Cine Joia",  u:"https://www.cinejoia.com.br/agenda/"},
  {l:"Balaclava",  u:"https://www.instagram.com/balaclavarecords/"},
  {l:"Francisca",  u:"https://casadefrancisca.art.br/novo/programacao"},
  {l:"Maldita",    u:"https://www.sympla.com.br/evento/a-porta-maldita-anomalia/2859672"},
  {l:"Porta",      u:"https://shotgun.live/en/venues/p-o-r-t-a"},
  {l:"Picles",     u:"https://shotgun.live/en/venues/picles"},
  {l:"Rockambole", u:"https://meaple.com.br/rockambole"},
  {l:"Bona",       u:"https://www.bona.art.br/event-list"}
];
LINKS.forEach(function(x) {
  var a = document.createElement("a");
  a.href = x.u; a.target = "_blank"; a.textContent = x.l;
  document.getElementById("footer").appendChild(a);
});

var GENRES = ["MPB","Samba","Rock","Indie","Hip-hop","Forro","Reggae","Jazz","Afrobeat","Eletronica","Punk","Choro","Grime","Folk","Classical","Post-punk","Experimental"];
var activeGenres = [];
GENRES.forEach(function(g) {
  var b = document.createElement("button");
  b.className = "chip"; b.textContent = g;
  b.onclick = function() {
    b.classList.toggle("on");
    var i = activeGenres.indexOf(g);
    if (i >= 0) activeGenres.splice(i,1); else activeGenres.push(g);
    render();
  };
  document.getElementById("chips").appendChild(b);
});

var EVENTS = [];
var dateFrom = null, dateTo = null;

// Load events.json (generated by GitHub Actions weekly)
fetch("data/events.json")
  .then(function(r) { return r.json(); })
  .then(function(data) {
    EVENTS = data.events || [];
    var updated = data.updated ? new Date(data.updated) : null;
    if (updated) {
      document.getElementById("updated").textContent =
        "atualizado " + updated.toLocaleDateString("pt-BR", {day:"2-digit", month:"short", year:"numeric"});
    }
    render();
  })
  .catch(function() {
    document.getElementById("list").innerHTML = "<div class='error'>Erro ao carregar events.json</div>";
  });

function toggleVenue(btn) {
  var v = btn.getAttribute("data-v"), on = btn.classList.contains("on");
  if (on && VENUES.filter(function(x){return x.id!==v&&activeVenues[x.id];}).length===0) return;
  activeVenues[v] = !on; btn.classList.toggle("on"); render();
}

function onDateChange() {
  dateFrom = document.getElementById("date-from").value || null;
  dateTo   = document.getElementById("date-to").value   || null;
  if (dateFrom && dateTo && dateTo < dateFrom) { dateTo = dateFrom; document.getElementById("date-to").value = dateTo; }
  var has = dateFrom || dateTo;
  document.getElementById("date-clear").className = has ? "clear-btn show" : "clear-btn";
  document.getElementById("date-from").className = "date-input" + (dateFrom ? " active" : "");
  document.getElementById("date-to").className   = "date-input" + (dateTo   ? " active" : "");
  render();
}

function clearDate() {
  dateFrom = dateTo = null;
  document.getElementById("date-from").value = "";
  document.getElementById("date-to").value   = "";
  document.getElementById("date-clear").className = "clear-btn";
  document.getElementById("date-from").className  = "date-input";
  document.getElementById("date-to").className    = "date-input";
  render();
}

function matchDate(ev) {
  if (!dateFrom && !dateTo) return true;
  var p = ev.iso || null;
  if (!p) return true;
  if (dateFrom && p < dateFrom) return false;
  if (dateTo   && p > dateTo)   return false;
  return true;
}

function matchGenre(ev) {
  if (!activeGenres.length) return false;
  return activeGenres.some(function(g){ return (ev.genre||"").toLowerCase().indexOf(g.toLowerCase()) >= 0; });
}

function dedup(items) {
  var s = {};
  return items.filter(function(e) {
    var k = (e.name+"|"+(e.iso||e.date)+"|"+e.v).toLowerCase().trim();
    if (s[k]) return false; s[k]=true; return true;
  });
}

function render() {
  var items = dedup(EVENTS.filter(function(e){ return activeVenues[e.v] && matchDate(e); }));
  items.sort(function(a,b){ return (matchGenre(b)?1:0) - (matchGenre(a)?1:0); });

  var genN = items.filter(matchGenre).length;
  var ct = items.length + " eventos";
  if (dateFrom || dateTo) {
    var fmt = function(iso){ var d=new Date(iso+"T12:00:00"); return d.toLocaleDateString("pt-BR",{day:"numeric",month:"short"}); };
    if (dateFrom && dateTo && dateFrom !== dateTo) ct += "  ·  " + fmt(dateFrom) + " — " + fmt(dateTo);
    else if (dateFrom) ct += "  ·  a partir de " + fmt(dateFrom);
    else if (dateTo)   ct += "  ·  até " + fmt(dateTo);
  }
  if (genN > 0) ct += "  ·  " + genN + " combinam";
  document.getElementById("count").textContent = ct;

  if (!items.length) {
    document.getElementById("list").innerHTML = "<div class='empty'>Nenhum evento encontrado.</div>";
    return;
  }

  document.getElementById("list").innerHTML = items.map(function(ev, i) {
    var vc = VM[ev.v] || {label:ev.v, tag:"t-sesc"};
    return "<a class='event' data-v='" + ev.v + "' href='" + (ev.url||"#") + "' target='_blank' style='animation-delay:" + (i*8) + "ms'>" +
      "<div>" +
        "<div class='when-day'>" + ev.date + "</div>" +
        (ev.time ? "<div class='when-time'>" + ev.time + "</div>" : "") +
      "</div>" +
      "<div>" +
        "<div class='who'>" + ev.name + "</div>" +
        "<div class='where'>" + ev.venue + (ev.price ? "<span class='price-tag'>" + ev.price + "</span>" : "") + "</div>" +
        (ev.detail ? "<div class='detail'>" + ev.detail + "</div>" : "") +
      "</div>" +
      "<div><span class='vtag " + vc.tag + "'>" + vc.label + "</span></div>" +
    "</a>";
  }).join("");
}
</script>
</body>
</html>
