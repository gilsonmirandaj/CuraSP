<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CuraSP — Shows em São Paulo</title>
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --card: #222;
      --accent: #f0a500;
      --accent2: #e05a00;
      --text: #e8e8e8;
      --muted: #777;
      --border: #2e2e2e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      line-height: 1.4;
    }

    /* ── Header ── */
    header {
      padding: 1.75rem 1rem 1.25rem;
      background: linear-gradient(135deg, #12122a 0%, #1a1a1a 100%);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); font-size: 0.82rem; margin-top: 0.3rem; letter-spacing: 0.5px; }

    /* ── Filters ── */
    .filters {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1rem;
    }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.4rem;
    }
    .filter-row:last-child { margin-bottom: 0; }
    .filter-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      min-width: 4rem;
    }

    .chip {
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #111; font-weight: 700; }

    /* ── Main layout ── */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 1.25rem 1rem 3rem;
    }

    /* ── Date groups ── */
    .date-group { margin-bottom: 2rem; }
    .date-header {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.7rem;
    }
    .date-header.today    { color: #4caf50; }
    .date-header.tomorrow { color: var(--accent2); }

    /* ── Event card ── */
    .card {
      display: flex;
      gap: 0.9rem;
      align-items: flex-start;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.6rem;
      transition: border-color 0.15s, transform 0.1s;
    }
    .card:hover { border-color: var(--accent); transform: translateX(3px); }
    .card.past { opacity: 0.4; }

    .card-time {
      min-width: 3.2rem;
      text-align: center;
      flex-shrink: 0;
    }
    .card-time .t-time {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
    }
    .card-time .t-date {
      display: block;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .card-body { flex: 1; min-width: 0; }
    .card-name {
      font-size: 0.97rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.2rem;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-detail {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta { display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; margin-top: 0.4rem; }

    .badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.12rem 0.45rem;
      border-radius: 4px;
      white-space: nowrap;
    }
    .b-venue { background: #1e1e3a; color: #9b9bdd; border: 1px solid #2a2a5a; }
    .b-genre { background: #1a2e1a; color: #7fb87f; border: 1px solid #2a4a2a; }
    .b-price { background: #2e1e0a; color: #ffb06a; border: 1px solid #5a3a1a; }
    .b-free  { background: #0a2e1a; color: #6adc9b; border: 1px solid #1a5a3a; }

    .buy-link {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.72rem;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 0.18rem 0.55rem;
      transition: all 0.15s;
    }
    .buy-link:hover { background: var(--accent); color: #111; }

    /* ── States ── */
    .state-msg {
      text-align: center;
      color: var(--muted);
      padding: 4rem 1rem;
      font-size: 1rem;
    }
    .state-msg small { display: block; font-size: 0.78rem; margin-top: 0.4rem; }

    .updated-bar {
      text-align: center;
      color: var(--muted);
      font-size: 0.7rem;
      padding: 0.75rem 1rem 1.5rem;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      header h1 { font-size: 1.6rem; letter-spacing: 2px; }
    }
  </style>
</head>
<body>

<header>
  <h1>CURASP</h1>
  <p>Shows e eventos em São Paulo</p>
</header>

<div class="filters">
  <div class="filter-row">
    <span class="filter-label">Quando</span>
    <button class="chip active" data-period="upcoming" onclick="setPeriod(this)">Próximos</button>
    <button class="chip" data-period="today"    onclick="setPeriod(this)">Hoje</button>
    <button class="chip" data-period="week"     onclick="setPeriod(this)">Esta semana</button>
    <button class="chip" data-period="all"      onclick="setPeriod(this)">Todos</button>
  </div>
  <div class="filter-row" id="row-venues">
    <span class="filter-label">Casa</span>
  </div>
  <div class="filter-row" id="row-genres">
    <span class="filter-label">Gênero</span>
  </div>
</div>

<main>
  <div id="state" class="state-msg">Carregando eventos…</div>
  <div id="events" style="display:none"></div>
</main>

<div id="updated-bar" class="updated-bar"></div>

<script>
  const $ = id => document.getElementById(id);
  const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  const MONTHS_PT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const DAYS_PT   = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

  function isoToLocalDate(iso) {
    if (!iso) return null;
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function todayISO() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function addDaysToISO(iso, n) {
    const d = isoToLocalDate(iso);
    d.setDate(d.getDate() + n);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function fmtHeader(iso) {
    const d = isoToLocalDate(iso);
    if (!d) return 'A confirmar';
    return `${DAYS_PT[d.getDay()]}, ${d.getDate()} de ${MONTHS_PT[d.getMonth()]}`;
  }

  /* ─── State ─── */
  let allEvents   = [];
  let period      = 'upcoming';
  let activeVenue = null;
  let activeGenre = null;

  const TODAY    = todayISO();
  const WEEK_END = addDaysToISO(TODAY, 7);
  const TOMORROW = addDaysToISO(TODAY, 1);

  /* ─── Filter controls ─── */
  function setPeriod(btn) {
    document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    period = btn.dataset.period;
    render();
  }

  function toggleVenue(btn, v) {
    if (activeVenue === v) {
      activeVenue = null;
      btn.classList.remove('active');
    } else {
      document.querySelectorAll('[data-venue]').forEach(b => b.classList.remove('active'));
      activeVenue = v;
      btn.classList.add('active');
    }
    render();
  }

  function toggleGenre(btn, g) {
    if (activeGenre === g) {
      activeGenre = null;
      btn.classList.remove('active');
    } else {
      document.querySelectorAll('[data-genre]').forEach(b => b.classList.remove('active'));
      activeGenre = g;
      btn.classList.add('active');
    }
    render();
  }

  /* ─── Filtering ─── */
  function applyFilters() {
    return allEvents.filter(e => {
      const iso = e.iso || '';
      if (period === 'today'    && iso !== TODAY)                    return false;
      if (period === 'week'     && (iso < TODAY || iso > WEEK_END))  return false;
      if (period === 'upcoming' && iso < TODAY)                      return false;
      if (activeVenue && e.v !== activeVenue)                        return false;
      if (activeGenre) {
        const parts = (e.genre || '').split(/[\/,]/).map(g => g.trim().toLowerCase());
        if (!parts.some(p => p.includes(activeGenre.toLowerCase()))) return false;
      }
      return true;
    });
  }

  /* ─── Render ─── */
  function render() {
    const filtered = applyFilters();
    const evEl = $('events');
    const stEl = $('state');

    if (!filtered.length) {
      evEl.style.display = 'none';
      stEl.style.display = 'block';
      stEl.innerHTML = 'Nenhum evento encontrado para esse filtro.<small>Tente "Todos" ou limpe os filtros de casa/gênero.</small>';
      return;
    }

    evEl.style.display = 'block';
    stEl.style.display = 'none';

    const groups = {};
    const noDate = [];
    for (const e of filtered) {
      if (!e.iso) { noDate.push(e); continue; }
      (groups[e.iso] = groups[e.iso] || []).push(e);
    }

    let html = '';
    for (const iso of Object.keys(groups).sort()) {
      const isPast     = iso < TODAY;
      const isToday    = iso === TODAY;
      const isTomorrow = iso === TOMORROW;

      let label = fmtHeader(iso);
      let cls   = 'date-header';
      if (isToday)    { label = `Hoje — ${label}`;   cls += ' today'; }
      if (isTomorrow) { label = `Amanhã — ${label}`; cls += ' tomorrow'; }

      html += `<div class="date-group"><div class="${cls}">${label}</div>`;
      for (const e of groups[iso]) html += cardHTML(e, isPast);
      html += `</div>`;
    }

    if (noDate.length) {
      html += `<div class="date-group"><div class="date-header">A confirmar</div>`;
      for (const e of noDate) html += cardHTML(e, false);
      html += `</div>`;
    }

    evEl.innerHTML = html;
  }

  function cardHTML(e, isPast) {
    const priceHTML = e.price
      ? (e.price.toLowerCase().includes('grat')
          ? `<span class="badge b-free">${esc(e.price)}</span>`
          : `<span class="badge b-price">${esc(e.price)}</span>`)
      : '';

    const linkHTML = e.url
      ? `<a class="buy-link" href="${esc(e.url)}" target="_blank" rel="noopener noreferrer">Ingressos →</a>`
      : '';

    return `
      <div class="card${isPast ? ' past' : ''}">
        <div class="card-time">
          <span class="t-time">${esc(e.time || '—')}</span>
          <span class="t-date">${esc(e.date || '')}</span>
        </div>
        <div class="card-body">
          <div class="card-name" title="${esc(e.name)}">${esc(e.name || '')}</div>
          ${e.detail ? `<div class="card-detail" title="${esc(e.detail)}">${esc(e.detail)}</div>` : ''}
          <div class="card-meta">
            ${e.venue ? `<span class="badge b-venue">${esc(e.venue)}</span>` : ''}
            ${e.genre ? `<span class="badge b-genre">${esc(e.genre)}</span>` : ''}
            ${priceHTML}
          </div>
          ${linkHTML}
        </div>
      </div>`;
  }

  /* ─── Build filter chips ─── */
  function buildFilters(events) {
    const venues = {};
    for (const e of events) {
      if (e.v && e.venue && !venues[e.v]) venues[e.v] = e.venue;
    }

    const vRow = $('row-venues');
    const vLabel = vRow.querySelector('.filter-label');
    vRow.innerHTML = '';
    vRow.appendChild(vLabel);
    for (const [v, name] of Object.entries(venues)) {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.dataset.venue = v;
      btn.textContent = name;
      btn.onclick = () => toggleVenue(btn, v);
      vRow.appendChild(btn);
    }

    const genreSet = new Set();
    for (const e of events) {
      (e.genre || '').split(/[\/,]/).forEach(g => { const t = g.trim(); if (t) genreSet.add(t); });
    }

    const gRow = $('row-genres');
    const gLabel = gRow.querySelector('.filter-label');
    gRow.innerHTML = '';
    gRow.appendChild(gLabel);
    for (const g of [...genreSet].sort()) {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.dataset.genre = g;
      btn.textContent = g;
      btn.onclick = () => toggleGenre(btn, g);
      gRow.appendChild(btn);
    }
  }

  /* ─── Bootstrap ─── */
  fetch('events.json')
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(data => {
      allEvents = (Array.isArray(data) ? data : (data.events || [])).filter(e => e && e.name);

      if (data.updated) {
        const d = new Date(data.updated);
        $('updated-bar').textContent =
          `Atualizado em ${d.toLocaleDateString('pt-BR')} às ${d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`;
      }

      $('state').style.display = 'none';
      buildFilters(allEvents);
      render();
    })
    .catch(err => {
      $('state').innerHTML = `Erro ao carregar eventos.<small>${esc(err.message)}</small>`;
    });
</script>

</body>
</html>
