}
.vbtn .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; background: #333; flex-shrink: 0; }
.vbtn.on { color: #f0f0f0; border-color: #333; background: #161616; }
.vbtn[data-v=“sesc”].on       { border-color: #e8ff47; color: #e8ff47; }
.vbtn[data-v=“sesc”].on .dot  { background: #e8ff47; }

.vbtn[data-v=“cine”].on .dot  { background: #ff3c3c; }
.vbtn[data-v=“balaclava”].on  { border-color: #6fb3ff; color: #6fb3ff; }
.vbtn[data-v=“balaclava”].on .dot { background: #6fb3ff; }
.vbtn[data-v=“francisca”].on  { border-color: #ff9f43; color: #ff9f43; }
.vbtn[data-v=“francisca”].on .dot { background: #ff9f43; }
.vbtn[data-v=“maldita”].on    { border-color: #ff6b9d; color: #ff6b9d; }

.vbtn[data-v=“porta”].on      { border-color: #a29bfe; color: #a29bfe; }

.vbtn[data-v=“rockambole”].on .dot { background: #fd79a8; }
.vbtn[data-v=“bona”].on       { border-color: #ffeaa7; color: #ffeaa7; }

/* Date range filter */
.date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.date-label { font-size: 10px; color: #333; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }
.date-sep { font-size: 10px; color: #2a2a2a; }
.date-input {
background: #0e0e0e; border: 1px solid #222; color: #888;
padding: 5px 10px; border-radius: 3px;
font-family: ‘DM Sans’, sans-serif; font-size: 11px;
outline: none; cursor: pointer; transition: border-color 0.15s;
color-scheme: dark;
}
.date-input:hover { border-color: #444; }
.date-input:focus { border-color: #555; color: #f0f0f0; }
.date-input.active { border-color: #555; color: #f0f0f0; }
#date-clear {
background: none; border: none; color: #333; font-size: 13px;
cursor: pointer; padding: 2px 6px; border-radius: 3px;
transition: color 0.15s; display: none;
}
#date-clear:hover { color: #f0f0f0; }
#date-clear.show { display: inline; }

.genre-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.chip {
border: 1px solid #1a1a1a; background: none; color: #333; padding: 3px 10px;
border-radius: 100px; font-size: 11px; cursor: pointer; transition: all 0.12s;
}
.chip:hover { border-color: #444; color: #aaa; }
.chip.on { background: #1e1e1e; border-color: #555; color: #f0f0f0; }

.bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.count { font-size: 10px; color: #2a2a2a; letter-spacing: 1px; }
.list-divider { height: 1px; background: #161616; }

.event {
display: grid; grid-template-columns: 82px 1fr auto; gap: 0 12px;
padding: 12px 0; border-bottom: 1px solid #141414;
text-decoration: none; color: inherit;
opacity: 0; animation: fi 0.2s forwards; align-items: start;
}
@keyframes fi { to { opacity: 1; } }
.event:hover .who { color: #fff; }

.when { font-size: 10px; color: #2a2a2a; line-height: 1.9; padding-top: 2px; }
.when strong { display: block; color: #4a4a4a; font-weight: 400; font-size: 11px; }
.who { font-size: 14px; font-weight: 400; margin-bottom: 2px; color: #bbb; transition: color 0.1s; line-height: 1.3; }
.meta { font-size: 11px; color: #2a2a2a; line-height: 1.6; }
.dtxt { font-size: 10px; color: #222; margin-top: 1px; }

font-family: ‘Bebas Neue’, sans-serif; font-size: 9px; letter-spacing: 1px;
padding: 2px 6px; border-radius: 2px; white-space: nowrap; display: inline-block; margin-top: 2px;

.source-note { margin-top: 36px; font-size: 10px; color: #1e1e1e; line-height: 2.2; text-align: center; }

// ── VENUE FILTER ──────────────────────────────────────────────────
function toggleVenue(btn) {
  var v = btn.getAttribute("data-v"), on = btn.classList.contains("on");
  if (on && VENUES.filter(function(x){return x.id!==v&&activeVenues[x.id];}).length===0) return;
  activeVenues[v] = !on; btn.classList.toggle("on"); render();
}

// ── DATE RANGE FILTER ─────────────────────────────────────────────
var dateFrom = null;
var dateTo   = null;

function parseDateStr(dateStr) {
  if (!dateStr) return null;
  var m = dateStr.match(/(\d{1,2})\/(\d{1,2})/);
  if (!m) return null;
  var day = parseInt(m[1], 10), month = parseInt(m[2], 10), year = 2026;
  if (month < 3) year = 2027;
  return year + "-" + String(month).padStart(2,"0") + "-" + String(day).padStart(2,"0");
}

function onDateChange() {
  dateFrom = document.getElementById("date-from").value || null;
  dateTo   = document.getElementById("date-to").value   || null;
  if (dateFrom && dateTo && dateTo < dateFrom) {
    dateTo = dateFrom;
    document.getElementById("date-to").value = dateTo;
  }
  var has = dateFrom || dateTo;
  document.getElementById("date-clear").className = has ? "show" : "";
  document.getElementById("date-from").className = "date-input" + (dateFrom ? " active" : "");
  document.getElementById("date-to").className   = "date-input" + (dateTo   ? " active" : "");
  render();
}

function clearDate() {
  dateFrom = dateTo = null;
  document.getElementById("date-from").value = "";
  document.getElementById("date-to").value   = "";
  document.getElementById("date-clear").className = "";
  document.getElementById("date-from").className  = "date-input";
  document.getElementById("date-to").className    = "date-input";
  render();
}

function matchDate(ev) {
  if (!dateFrom && !dateTo) return true;
  var p = parseDateStr(ev.date);
  if (!p) return true;
  if (dateFrom && p < dateFrom) return false;
  if (dateTo   && p > dateTo)   return false;
  return true;
}

// ── GENRE FILTER ──────────────────────────────────────────────────
var GENRES = ["MPB","Samba","Rock","Indie","Hip-hop","Forro","Reggae","Jazz","Afrobeat","Eletronica","Punk","Choro","Grime","Folk","Classical","Post-punk","Experimental"];
var activeGenres = [];

GENRES.forEach(function(g) {
  var b = document.createElement("button");
  b.className = "chip"; b.textContent = g;
  b.onclick = function() {
    b.classList.toggle("on");
    var i = activeGenres.indexOf(g);
    if (i >= 0) activeGenres.splice(i,1); else activeGenres.push(g);
    render();
  };
  document.getElementById("chips").appendChild(b);
});

function matchGenre(ev) {
  if (!activeGenres.length) return false;
  return activeGenres.some(function(g){ return ev.genre.toLowerCase().indexOf(g.toLowerCase()) >= 0; });
}

function dedup(items) {
  var s = {};
  return items.filter(function(e) {
    var k = (e.name+"|"+e.date+"|"+e.v).toLowerCase().trim();
    if (s[k]) return false; s[k]=true; return true;
  });
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  var items = dedup(SEED.filter(function(e){ return activeVenues[e.v] && matchDate(e); }));

  // Sort: genre matches first
  items.sort(function(a,b){
    return (matchGenre(b)?1:0) - (matchGenre(a)?1:0);
  });

  // Count label
  var genN = items.filter(matchGenre).length;
  var ct = items.length + " EVENTOS";
  if (dateFrom || dateTo) {
    var fmt = function(iso){ var d=new Date(iso+"T12:00:00"); return d.toLocaleDateString("pt-BR",{day:"numeric",month:"short"}).toUpperCase(); };
    if (dateFrom && dateTo && dateFrom !== dateTo) ct += " · " + fmt(dateFrom) + " — " + fmt(dateTo);
    else if (dateFrom) ct += " · A PARTIR DE " + fmt(dateFrom);
    else if (dateTo)   ct += " · ATE " + fmt(dateTo);
  }
  if (genN > 0) ct += " · " + genN + " COMBINAM";
  document.getElementById("count").textContent = ct;

  if (!items.length) {
    document.getElementById("list").innerHTML = "<div class='empty'>Nenhum evento encontrado.</div>";
    return;
  }

  document.getElementById("list").innerHTML = items.map(function(ev, i) {
    var vc = VM[ev.v] || {label:ev.v, cls:"p-sesc", color:"#888"};
    var gm = matchGenre(ev);
    var cls = "event" + (gm ? " genre-match" : "");
    return "<a class='" + cls + "' href='" + (ev.url||"#") + "' target='_blank' style='animation-delay:" + (i*10) + "ms'>" +
      "<div class='when'><strong>" + ev.date + "</strong>" + (ev.time||"") + "</div>" +
      "<div>" +
        "<div class='who'>" + (gm ? "<span style='display:inline-block;width:5px;height:5px;border-radius:50%;background:" + vc.color + ";margin-right:5px;vertical-align:middle'></span>" : "") + ev.name + "</div>" +
        "<div class='meta'>" + ev.venue + (ev.price ? " &middot; " + ev.price : "") + "</div>" +
        (ev.detail ? "<div class='dtxt'>" + ev.detail + "</div>" : "") +
      "</div>" +
      "<div><span class='venue-pill " + vc.cls + "'>" + vc.label + "</span></div>" +
    "</a>";
  }).join("");
}

render();
</script>
