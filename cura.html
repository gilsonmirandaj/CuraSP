  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0e0e0e; color: #f0f0f0;
    font-family: 'DM Sans', sans-serif; font-weight: 300;
    max-width: 680px; margin: 0 auto; padding: 28px 20px 60px;
  }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; letter-spacing: 2px; }
  .sub { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #3a3a3a; margin-top: 4px; margin-bottom: 18px; }

.topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }

.btn-top {
display: inline-flex; align-items: center; gap: 7px;
border: none; padding: 8px 16px; border-radius: 100px;
font-family: ‘DM Sans’, sans-serif; font-size: 11px; font-weight: 400;
letter-spacing: 1px; cursor: pointer; transition: opacity 0.15s; flex-shrink: 0;
}
#lastfm-btn { background: #d51007; color: #fff; }
#lastfm-btn:hover { opacity: 0.85; }
#lastfm-btn.connected { background: #111; color: #d51007; border: 1px solid #d51007; }
#update-btn { background: none; color: #444; border: 1px solid #222; }
#update-btn:hover { border-color: #555; color: #f0f0f0; }

#setup-banner {
background: #161616; border: 1px solid #2a2a2a; border-radius: 4px;
padding: 14px 16px; margin-bottom: 18px;
}
#setup-banner p { font-size: 11px; color: #555; margin-bottom: 10px; line-height: 1.7; }
#setup-banner p a { color: #888; }
.key-row { display: flex; gap: 8px; }
.key-input {
flex: 1; background: #0e0e0e; border: 1px solid #2a2a2a; color: #f0f0f0;
padding: 7px 12px; border-radius: 3px; font-family: ‘DM Sans’, sans-serif;
font-size: 11px; outline: none; letter-spacing: 1px;
}
.key-input:focus { border-color: #444; }
.key-input::placeholder { color: #333; letter-spacing: 0; }
.save-btn {
background: #f0f0f0; color: #0e0e0e; border: none; padding: 7px 14px;
border-radius: 3px; font-family: ‘Bebas Neue’, sans-serif; font-size: 11px;
letter-spacing: 1px; cursor: pointer; white-space: nowrap;
}
.save-btn:hover { background: #ccc; }

.last-update { font-size: 10px; color: #2a2a2a; letter-spacing: 1px; flex: 1; text-align: right; }

.lfm-bar {
background: #161616; border-radius: 3px; padding: 10px 14px;
margin-bottom: 14px; font-size: 11px; color: #444; display: none;
}
.lfm-bar.show { display: block; }
.lfm-bar span { color: #d51007; }

.venue-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.vbtn {
border: 1px solid #1e1e1e; background: none; color: #333; padding: 4px 10px;
border-radius: 3px; font-size: 10px; font-family: ‘Bebas Neue’, sans-serif;
letter-spacing: 1px; cursor: pointer; transition: all 0.15s;
display: flex; align-items: center; gap: 4px;
}
.vbtn .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; background: #333; flex-shrink: 0; }
.vbtn.on { color: #f0f0f0; border-color: #333; background: #161616; }
.vbtn[data-v=“sesc”].on       { border-color: #e8ff47; color: #e8ff47; }
.vbtn[data-v=“sesc”].on .dot  { background: #e8ff47; }
.vbtn[data-v=“cine”].on       { border-color: #ff3c3c; color: #ff3c3c; }
.vbtn[data-v=“cine”].on .dot  { background: #ff3c3c; }
.vbtn[data-v=“balaclava”].on  { border-color: #6fb3ff; color: #6fb3ff; }
.vbtn[data-v=“balaclava”].on .dot { background: #6fb3ff; }
.vbtn[data-v=“francisca”].on  { border-color: #ff9f43; color: #ff9f43; }
.vbtn[data-v=“francisca”].on .dot { background: #ff9f43; }
.vbtn[data-v=“maldita”].on    { border-color: #ff6b9d; color: #ff6b9d; }
.vbtn[data-v=“maldita”].on .dot { background: #ff6b9d; }
.vbtn[data-v=“porta”].on      { border-color: #a29bfe; color: #a29bfe; }
.vbtn[data-v=“porta”].on .dot { background: #a29bfe; }
.vbtn[data-v=“picles”].on     { border-color: #55efc4; color: #55efc4; }
.vbtn[data-v=“picles”].on .dot { background: #55efc4; }
.vbtn[data-v=“rockambole”].on { border-color: #fd79a8; color: #fd79a8; }
.vbtn[data-v=“rockambole”].on .dot { background: #fd79a8; }
.vbtn[data-v=“bona”].on       { border-color: #ffeaa7; color: #ffeaa7; }
.vbtn[data-v=“bona”].on .dot  { background: #ffeaa7; }

.divider-thin { height: 1px; background: #161616; margin: 12px 0; }

/* Date range filter */
.date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.date-label { font-size: 10px; color: #333; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }
.date-sep { font-size: 10px; color: #2a2a2a; }
.date-input {
background: #0e0e0e; border: 1px solid #222; color: #888;
padding: 5px 10px; border-radius: 3px;
font-family: ‘DM Sans’, sans-serif; font-size: 11px;
outline: none; cursor: pointer; transition: border-color 0.15s;
color-scheme: dark;
}
.date-input:hover { border-color: #444; }
.date-input:focus { border-color: #555; color: #f0f0f0; }
.date-input.active { border-color: #555; color: #f0f0f0; }
#date-clear {
background: none; border: none; color: #333; font-size: 13px;
cursor: pointer; padding: 2px 6px; border-radius: 3px;
transition: color 0.15s; display: none;
}
#date-clear:hover { color: #f0f0f0; }
#date-clear.show { display: inline; }

.genre-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.chip {
border: 1px solid #1a1a1a; background: none; color: #333; padding: 3px 10px;
border-radius: 100px; font-size: 11px; cursor: pointer; transition: all 0.12s;
}
.chip:hover { border-color: #444; color: #aaa; }
.chip.on { background: #1e1e1e; border-color: #555; color: #f0f0f0; }

.bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.count { font-size: 10px; color: #2a2a2a; letter-spacing: 1px; }

.list-divider { height: 1px; background: #161616; }

.event {
display: grid; grid-template-columns: 82px 1fr auto; gap: 0 12px;
padding: 12px 0; border-bottom: 1px solid #141414;
text-decoration: none; color: inherit;
opacity: 0; animation: fi 0.2s forwards; align-items: start;
}
@keyframes fi { to { opacity: 1; } }
.event:hover .who { color: #fff; }
.event.lfm-match { border-left: 2px solid #d51007; padding-left: 10px; margin-left: -12px; }
.event.is-new .who::after { content: “ \2022”; color: #444; font-size: 10px; }

.when { font-size: 10px; color: #2a2a2a; line-height: 1.9; padding-top: 2px; }
.when strong { display: block; color: #4a4a4a; font-weight: 400; font-size: 11px; }
.who { font-size: 14px; font-weight: 400; margin-bottom: 2px; color: #bbb; transition: color 0.1s; line-height: 1.3; }
.meta { font-size: 11px; color: #2a2a2a; line-height: 1.6; }
.dtxt { font-size: 10px; color: #222; margin-top: 1px; }

.venue-pill {
font-family: ‘Bebas Neue’, sans-serif; font-size: 9px; letter-spacing: 1px;
padding: 2px 6px; border-radius: 2px; white-space: nowrap; display: inline-block; margin-top: 2px;
}
.p-sesc       { background: rgba(232,255,71,0.07);  color: #e8ff47; }
.p-cine       { background: rgba(255,60,60,0.07);   color: #ff3c3c; }
.p-balaclava  { background: rgba(111,179,255,0.07); color: #6fb3ff; }
.p-francisca  { background: rgba(255,159,67,0.07);  color: #ff9f43; }
.p-maldita    { background: rgba(255,107,157,0.07); color: #ff6b9d; }
.p-porta      { background: rgba(162,155,254,0.07); color: #a29bfe; }
.p-picles     { background: rgba(85,239,196,0.07);  color: #55efc4; }
.p-rockambole { background: rgba(253,121,168,0.07); color: #fd79a8; }
.p-bona       { background: rgba(255,234,167,0.07); color: #ffeaa7; }

.match-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.empty { text-align: center; padding: 48px 0; color: #222; font-size: 13px; line-height: 2; }

.fetch-overlay {
position: fixed; inset: 0; background: rgba(14,14,14,0.93);
display: none; align-items: center; justify-content: center;
flex-direction: column; gap: 16px; z-index: 50;
}
.fetch-overlay.show { display: flex; }
.spinner { width: 32px; height: 32px; border: 2px solid #222; border-top-color: #f0f0f0; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.fetch-msg { font-size: 11px; letter-spacing: 2px; color: #555; text-transform: uppercase; }

.toast {
position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
background: #1a1a1a; border: 1px solid #2a2a2a; color: #aaa;
font-size: 11px; letter-spacing: 1px; padding: 10px 20px;
border-radius: 100px; z-index: 99; white-space: nowrap; pointer-events: none;
}

.source-note { margin-top: 36px; font-size: 10px; color: #1e1e1e; line-height: 2.2; text-align: center; }
.source-note a { color: #252525; text-decoration: none; }
.source-note a:hover { color: #555; }
</style>

function load() { try { var r=localStorage.getItem(SK); return r?JSON.parse(r):null; } catch(e){return null;} }
function save(d) { try { localStorage.setItem(SK,JSON.stringify(d)); } catch(e){} }
function getAKey() { try { return localStorage.getItem(SK_AKEY)||""; } catch(e){return "";} }
function saveAnthropicKey() {
  var k=document.getElementById("api-key-input").value.trim();
  if(!k.startsWith("sk-ant-")){toast("Chave invalida. Deve comecar com sk-ant-");return;}
  try{localStorage.setItem(SK_AKEY,k);}catch(e){}
  document.getElementById("setup-banner").style.display="none";
  toast("Chave salva!");
}

function ekey(e){return(e.name+"|"+e.date+"|"+e.v).toLowerCase().trim();}
function merge(existing,incoming,addedDate){
  var keys={};
  existing.forEach(function(e){keys[ekey(e)]=true;});
  var n=0;
  incoming.forEach(function(e){
    var k=ekey(e);
    if(!keys[k]){e.added=addedDate;existing.push(e);keys[k]=true;n++;}
  });
  return n;
}

var lfmArtists = [];   // lowercase artist names from Last.fm
var lfmTags    = [];   // top genre tags
var lfmActive  = false;

async function toggleLastfm() {
  if (lfmActive) {
    lfmActive = false; lfmArtists = []; lfmTags = [];
    document.getElementById("lastfm-btn").className = "btn-top";
    document.getElementById("lastfm-btn").textContent = "♫ LAST.FM";
    document.getElementById("lfm-bar").className = "lfm-bar";
    render(); return;
  }
  document.getElementById("lfm-status").textContent = "carregando...";
  document.getElementById("lfm-bar").className = "lfm-bar show";
  try {
    // Fetch top artists (overall)
    var r1 = await fetch(LASTFM_API + "?method=user.gettopartists&user=" + LASTFM_USER +
      "&api_key=" + LASTFM_KEY + "&format=json&limit=100");
    var d1 = await r1.json();
    if (d1.error) throw new Error(d1.message);
    lfmArtists = (d1.topartists.artist||[]).map(function(a){return a.name.toLowerCase();});

    // Fetch top tags for genre matching
    var r2 = await fetch(LASTFM_API + "?method=user.gettoptags&user=" + LASTFM_USER +
      "&api_key=" + LASTFM_KEY + "&format=json&limit=20");
    var d2 = await r2.json();
    lfmTags = (d2.toptags && d2.toptags.tag ? d2.toptags.tag : []).map(function(t){return t.name.toLowerCase();});

    lfmActive = true;
    document.getElementById("lastfm-btn").className = "btn-top connected";
    document.getElementById("lastfm-btn").textContent = "♫ " + LASTFM_USER;
    document.getElementById("lfm-status").textContent =
      lfmArtists.length + " artistas carregados · " + lfmTags.slice(0,5).join(", ");
    render();
  } catch(e) {
    document.getElementById("lfm-bar").className = "lfm-bar";
    toast("Erro Last.fm: " + e.message.slice(0,60));
  }
}

function isLfmMatch(ev) {
  if (!lfmActive) return false;
  var n = ev.name.toLowerCase();
  // Direct artist match
  if (lfmArtists.some(function(a){return n.indexOf(a)>=0||a.indexOf(n)>=0;})) return true;
  // Genre/tag match
  var g = ev.genre.toLowerCase();
  if (lfmTags.some(function(t){return g.indexOf(t)>=0||t.indexOf(g)>=0;})) return true;
  return false;
}

// ── SCHEDULE ──────────────────────────────────────────────────────
function lastMon23() {
  var now=new Date(),day=now.getDay(),back=(day===0?6:day-1);
  var t=new Date(now);t.setDate(now.getDate()-back);t.setHours(23,0,0,0);return t;
}
function nextMon23() {
  var now=new Date(),day=now.getDay(),ahead=(day===0?1:(8-day)%7||7);
  var t=new Date(now);t.setDate(now.getDate()+ahead);t.setHours(23,0,0,0);return t;
}
function shouldAutoFetch(){
  if(!getAKey()||!store.lastFetch)return false;
  return new Date(store.lastFetch)<lastMon23()&&new Date()>=lastMon23();
}

var PROMPT="Today is {today}. Search the web for upcoming shows and concerts at these Sao Paulo music venues in the next 4 weeks:\n\n1. SESC Sao Paulo - sescsp.org.br/programacao\n2. Cine Joia - cinejoia.com.br/agenda\n3. Balaclava Records - instagram.com/balaclavarecords and ingresse.com\n4. Casa de Francisca - casadefrancisca.art.br/novo/programacao\n5. A Porta Maldita - sympla.com.br and @aportamaldita\n6. Porta Pinheiros - shotgun.live/venues/p-o-r-t-a\n7. Picles Cardeal - shotgun.live/venues/picles\n8. Casa Rockambole - meaple.com.br/rockambole\n9. Bona Casa de Musica - bona.art.br/event-list and eventim.com.br\n\nReturn ONLY a raw JSON array, no markdown, no backticks.\nEach object: name, detail, date (like 'Sex 09/5'), time (like '20h' or ''), venue, v (one of: sesc|cine|balaclava|francisca|maldita|porta|picles|rockambole|bona), genre, price (like 'R$40' or 'Gratis' or ''), url.\nOnly real confirmed events. Return 20-40 events.";

async function doFetch(manual) {
  var key=getAKey();
  if(!key){document.getElementById("setup-banner").style.display="block";toast("Insira sua API key primeiro");return;}
  setOverlay(true,manual?"buscando programacao...":"atualizacao semanal...");
  document.getElementById("update-btn").disabled=true;
  var today=new Date().toLocaleDateString("pt-BR",{day:"numeric",month:"long",year:"numeric"});
  try {
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:PROMPT.replace("{today}",today)}]})
    });
    if(!res.ok){var err=await res.text();throw new Error("API "+res.status+" - "+(JSON.parse(err).error?.message||err).slice(0,100));}
    var data=await res.json();
    var text=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n");
    var match=text.match(/\[[\s\S]*\]/);
    if(!match)throw new Error("Nenhum JSON encontrado");
    var incoming=JSON.parse(match[0]);
    if(!Array.isArray(incoming))throw new Error("Resposta invalida");
    var fetchDate=new Date().toISOString().slice(0,10);
    var added=merge(store.events,incoming,fetchDate);
    store.lastFetch=fetchDate;save(store);
    updateLastUpdate();render();setOverlay(false);
    toast(manual?"+" +added+" novos eventos":"Atualizado! +"+added+" novos");
  } catch(e){setOverlay(false);toast("Erro: "+e.message.slice(0,80));console.error(e);}
  document.getElementById("update-btn").disabled=false;
}

// ── DATE RANGE FILTER ─────────────────────────────────────────────
var dateFrom = null;
var dateTo   = null;

function parseDateStr(dateStr) {
  if (!dateStr) return null;
  var m = dateStr.match(/(\d{1,2})\/(\d{1,2})/);
  if (!m) return null;
  var day = parseInt(m[1], 10);
  var month = parseInt(m[2], 10);
  var year = 2026;
  if (month < 3) year = 2027;
  return year + "-" + String(month).padStart(2,"0") + "-" + String(day).padStart(2,"0");
}

function onDateChange() {
  dateFrom = document.getElementById("date-from").value || null;
  dateTo   = document.getElementById("date-to").value   || null;
  if (dateFrom && dateTo && dateTo < dateFrom) {
    dateTo = dateFrom;
    document.getElementById("date-to").value = dateTo;
  }
  var hasFilter = dateFrom || dateTo;
  document.getElementById("date-clear").className = hasFilter ? "show" : "";
  document.getElementById("date-from").className = "date-input" + (dateFrom ? " active" : "");
  document.getElementById("date-to").className   = "date-input" + (dateTo   ? " active" : "");
  render();
}

function clearDate() {
  dateFrom = dateTo = null;
  document.getElementById("date-from").value = "";
  document.getElementById("date-to").value   = "";
  document.getElementById("date-clear").className = "";
  document.getElementById("date-from").className  = "date-input";
  document.getElementById("date-to").className    = "date-input";
  render();
}

function matchDate(ev) {
  if (!dateFrom && !dateTo) return true;
  var parsed = parseDateStr(ev.date);
  if (!parsed) return true;
  if (dateFrom && parsed < dateFrom) return false;
  if (dateTo   && parsed > dateTo)   return false;
  return true;
}

var GENRES=["MPB","Samba","Rock","Indie","Hip-hop","Forro","Reggae","Jazz","Afrobeat","Eletronica","Punk","Choro","Grime","Folk","Classical","Post-punk","Experimental"];
var activeGenres=[];
GENRES.forEach(function(g){
  var b=document.createElement("button");b.className="chip";b.textContent=g;
  b.onclick=function(){b.classList.toggle("on");var i=activeGenres.indexOf(g);if(i>=0)activeGenres.splice(i,1);else activeGenres.push(g);render();};
  document.getElementById("chips").appendChild(b);
});
function toggleVenue(btn){
  var v=btn.getAttribute("data-v"),on=btn.classList.contains("on");
  if(on&&VENUES.filter(function(x){return x.id!==v&&activeVenues[x.id];}).length===0)return;
  activeVenues[v]=!on;btn.classList.toggle("on");render();
}
function matchGenre(ev){if(!activeGenres.length)return false;return activeGenres.some(function(g){return ev.genre.toLowerCase().indexOf(g.toLowerCase())>=0;});}
function dedup(items){var s={};return items.filter(function(e){var k=ekey(e);if(s[k])return false;s[k]=true;return true;});}

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  var list=document.getElementById("list");
  var all=(load()||store).events;
  var dates=all.map(function(e){return e.added||"2026-04-06";}).sort();
  var uniq=dates.filter(function(d,i,a){return a.indexOf(d)===i;});
  var newest=uniq[uniq.length-1],prev=uniq.length>1?uniq[uniq.length-2]:null;

  var items=dedup(all.filter(function(e){return activeVenues[e.v] && matchDate(e);}));
  items.sort(function(a,b){
    var sa=(isLfmMatch(a)?100:0)+(matchGenre(a)?10:0);
    var sb=(isLfmMatch(b)?100:0)+(matchGenre(b)?10:0);
    return sb-sa;
  });

  var lfmN=items.filter(isLfmMatch).length,genN=items.filter(matchGenre).length;
  var ct=items.length+" EVENTOS";
  if(dateFrom||dateTo){
    var fmtD=function(iso){var d=new Date(iso+"T12:00:00");return d.toLocaleDateString("pt-BR",{day:"numeric",month:"short"}).toUpperCase();};
    if(dateFrom&&dateTo&&dateFrom!==dateTo)ct+=" DE "+fmtD(dateFrom)+" ATE "+fmtD(dateTo);
    else if(dateFrom)ct+=" A PARTIR DE "+fmtD(dateFrom);
    else if(dateTo)ct+=" ATE "+fmtD(dateTo);
  }
  if(lfmN>0)ct+=" \u00b7 "+lfmN+" COMBINAM COM SEU GOSTO";
  else if(genN>0)ct+=" \u00b7 "+genN+" COMBINAM";
  document.getElementById("count").textContent=ct;

  if(!items.length){list.innerHTML="<div class='empty'>Nenhum evento.</div>";return;}

  list.innerHTML=items.map(function(ev,i){
    var vc=VM[ev.v]||{label:ev.v,cls:"p-sesc",color:"#888"};
    var lfm=isLfmMatch(ev),gm=matchGenre(ev);
    var dc=lfm?"#d51007":vc.color;
    var isNew=prev&&ev.added===newest&&newest!=="2026-04-06";
    var cls="event"+(lfm?" lfm-match":"")+(isNew?" is-new":"");
    return "<a class='"+cls+"' href='"+(ev.url||"#")+"' target='_blank' style='animation-delay:"+(i*12)+"ms'>"+
      "<div class='when'><strong>"+ev.date+"</strong>"+(ev.time||"")+"</div>"+
      "<div>"+
        "<div class='who'>"+((lfm||gm)?"<span class='match-dot' style='background:"+dc+"'></span>":"")+ev.name+
        (lfm?" <span style='font-size:9px;color:#d51007;letter-spacing:1px'>LFM</span>":"")+
        "</div>"+
        "<div class='meta'>"+ev.venue+(ev.price?" &middot; "+ev.price:"")+"</div>"+
        (ev.detail?"<div class='dtxt'>"+ev.detail+"</div>":"")+
      "</div>"+
      "<div><span class='venue-pill "+vc.cls+"'>"+vc.label+"</span></div>"+
    "</a>";
  }).join("");
}

// ── BOOT ──────────────────────────────────────────────────────────
updateLastUpdate();
render();
// Auto load Last.fm on start
toggleLastfm();
// Weekly auto-fetch scheduler
setInterval(function(){if(shouldAutoFetch())doFetch(false);},60000);
if(shouldAutoFetch())doFetch(false);
</script>
